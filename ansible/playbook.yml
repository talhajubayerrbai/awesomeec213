---
- name: Configure Python FastAPI application
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    service_name: python-app

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - python3.12
          - python3.12-venv
          - python3-pip
          - nginx
          - curl
        state: present

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy application entrypoint (main.py)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../main.py"
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Copy app package directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/"
        dest: "{{ app_dir }}/app/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"

    - name: Check if public directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../public"
      register: public_dir
      delegate_to: localhost
      become: false

    - name: Copy public directory if it exists
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"
      when: public_dir.stat.exists

    - name: Check if requirements.txt exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../requirements.txt"
      register: requirements_file
      delegate_to: localhost
      become: false

    - name: Copy requirements.txt if it exists
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: requirements_file.stat.exists

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3.12 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/python"

    - name: Upgrade pip in virtualenv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12

    - name: Install Python dependencies from requirements.txt
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12
      when: requirements_file.stat.exists

    - name: Install core app dependencies (if no requirements.txt)
      ansible.builtin.pip:
        name:
          - fastapi
          - uvicorn[standard]
          - gunicorn
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12
      when: not requirements_file.stat.exists

    - name: Ensure gunicorn is installed in virtualenv
      ansible.builtin.pip:
        name:
          - gunicorn
          - uvicorn[standard]
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12

    - name: Set ownership of app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Create systemd service for the application
      ansible.builtin.copy:
        dest: /etc/systemd/system/{{ service_name }}.service
        content: |
          [Unit]
          Description=Python FastAPI Application
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000
          Restart=always
          RestartSec=5
          Environment=APP_ENV=production
          Environment=PORT=8000

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Configure nginx as reverse proxy
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_read_timeout 60s;
              }
          }
        mode: "0644"

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove nginx default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start application service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: restarted

    - name: Enable and start nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    - name: Verify application is listening on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        timeout: 60
        state: started

    - name: Health check via nginx (port 80)
      ansible.builtin.uri:
        url: http://127.0.0.1:80/health/
        method: GET
        status_code: [200, 301, 302, 307, 308]
        timeout: 30
      retries: 5
      delay: 10
      register: health_result
      until: health_result.status in [200, 301, 302, 307, 308]