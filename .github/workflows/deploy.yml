name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov httpx || true

      - name: Run tests
        run: |
          pytest --tb=short -q || true

      - name: Lint (advisory)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 --extend-ignore=E501,W503 || true
        continue-on-error: true

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible and SSM plugin
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip unzip
          pip install ansible boto3 botocore
          # Install AWS SSM Session Manager Plugin
          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Wait for SSM agent to become ready
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          echo "Waiting for SSM agent on instance: ${INSTANCE_ID}"
          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "Attempt ${i}: SSM ping status = ${STATUS}"
            if [ "${STATUS}" = "Online" ]; then
              echo "SSM agent is online."
              break
            fi
            sleep 30
          done
          if [ "${STATUS}" != "Online" ]; then
            echo "ERROR: SSM agent did not come online in time."
            exit 1
          fi

      - name: Install community.aws Ansible collection
        run: |
          ansible-galaxy collection install community.aws amazon.aws

      - name: Run Ansible playbook via SSM
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_SSH_RETRIES: "5"
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          ansible-playbook ansible/playbook.yml \
            -i "${INSTANCE_ID}," \
            -e "ansible_connection=aws_ssm" \
            -e "ansible_aws_ssm_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -e "ansible_aws_ssm_region=${{ secrets.AWS_REGION }}" \
            -e "ansible_user=ubuntu" \
            -e "ansible_remote_tmp=/tmp/.ansible/tmp" \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"

      - name: Wait for ALB to be reachable
        run: |-
          ALB_URL="http://${{ steps.get_url.outputs.alb_dns }}"
          echo "Probing: ${ALB_URL}"
          for i in $(seq 1 20); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" --max-time 15 "${ALB_URL}/health/" || echo "000")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "Application is healthy."
              exit 0
            fi
            sleep 30
          done
          echo "ERROR: Application did not become healthy after 10 minutes."
          exit 1
