name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest httpx || true

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v || true
          else
            echo "No tests directory found, skipping."
          fi

      - name: Lint (advisory only)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 --exclude=.venv,venv || true
        continue-on-error: true

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
      alb_dns_name: ${{ steps.tf_outputs.outputs.alb_dns_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform Outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible and SSM plugin
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip3 install ansible boto3 botocore
          # Install AWS SSM Session Manager plugin
          curl -sSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Wait for SSM agent to be ready
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          echo "Waiting for SSM agent on instance $INSTANCE_ID..."
          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "Attempt $i: SSM ping status = $STATUS"
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online."
              break
            fi
            sleep 30
          done
          if [ "$STATUS" != "Online" ]; then
            echo "ERROR: SSM agent did not come online in time."
            exit 1
          fi

      - name: Run Ansible Playbook via SSM
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          ansible-playbook ansible/playbook.yml \
            -i "$INSTANCE_ID," \
            --connection=aws_ssm \
            -e "ansible_aws_ssm_region=${{ secrets.AWS_REGION }}" \
            -e "ansible_connection=aws_ssm" \
            -e "ansible_aws_ssm_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -e "ansible_python_interpreter=/usr/bin/python3"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "app_url=http://$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Wait for app to be healthy
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Probing $APP_URL ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" --max-time 15 "$APP_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "App is healthy - HTTP $STATUS"
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: App did not return 2xx/3xx after retries. Last status: $STATUS"
          exit 1
